name: API CI

on:
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - "packages/**"
      - "package.json"
      - ".github/workflows/api.yml"
  pull_request:
    branches: [main]
    paths:
      - "apps/api/**"
      - "packages/**"
      - "package.json"
      - ".github/workflows/api.yml"

concurrency:
  group: api-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Build, Lint & Test
  # ---------------------------------------------------------------------------
  build:
    name: Build & Lint
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: charity
          POSTGRES_PASSWORD: charity
          POSTGRES_DB: charity_coin
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U charity"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://charity:charity@localhost:5432/charity_coin
      REDIS_URL: redis://localhost:6379

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit
        working-directory: apps/api

      - name: Lint
        run: npx turbo run lint --filter=charity-coin-api

      - name: Build API
        run: npx turbo run build --filter=charity-coin-api

      - name: Run database migrations
        run: cd apps/api && npx drizzle-kit migrate

  # ---------------------------------------------------------------------------
  # Security & Dependency Audit
  # ---------------------------------------------------------------------------
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: NPM dependency audit
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Run Trivy vulnerability scanner (filesystem)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: apps/api
          severity: HIGH,CRITICAL
          exit-code: "0"
          format: table

  # ---------------------------------------------------------------------------
  # Docker Build
  # ---------------------------------------------------------------------------
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/api
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # Deploy to Staging
  # ---------------------------------------------------------------------------
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [docker, security]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: staging

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to staging
        run: |
          echo "Deploying API to staging environment..."
          echo "Image: ghcr.io/${{ github.repository }}/api:${GITHUB_SHA::7}"
          # Replace with actual deployment command, e.g.:
          # - kubectl set image deployment/api api=ghcr.io/${{ github.repository }}/api:${GITHUB_SHA::7}
          # - aws ecs update-service ...
          # - fly deploy ...

      - name: Run smoke tests
        run: |
          echo "Running smoke tests against staging..."
          # curl -f https://staging-api.charitycoin.xyz/health || exit 1

  # ---------------------------------------------------------------------------
  # Deploy to Production (manual approval via environment protection)
  # ---------------------------------------------------------------------------
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to production
        run: |
          echo "Deploying API to production environment..."
          echo "Image: ghcr.io/${{ github.repository }}/api:${GITHUB_SHA::7}"
          # Replace with actual deployment command

      - name: Run production smoke tests
        run: |
          echo "Running smoke tests against production..."
          # curl -f https://api.charitycoin.xyz/health || exit 1

      - name: Notify deployment
        if: always()
        run: |
          echo "Deployment status: ${{ job.status }}"
          # Post to Slack/Discord:
          # curl -X POST "${{ secrets.SLACK_WEBHOOK }}" \
          #   -H 'Content-Type: application/json' \
          #   -d '{"text":"API deployed to production: ${{ job.status }}"}'
