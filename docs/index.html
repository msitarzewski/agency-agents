<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3250;
    --text: #e2e8f0;
    --muted: #8892aa;
    --accent: #6366f1;
    --accent-hover: #818cf8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; }

  /* Header */
  .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; display: flex; align-items: center; gap: 16px; height: 60px; position: sticky; top: 0; z-index: 100; }
  .logo { font-size: 1.25rem; font-weight: 700; white-space: nowrap; }
  .logo span { color: var(--accent); }
  .search-wrap { flex: 1; max-width: 440px; position: relative; }
  .search-wrap input { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 8px 14px 8px 38px; border-radius: 8px; font-size: 0.9rem; outline: none; transition: border-color 0.2s; }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 0.9rem; pointer-events: none; }
  .search-hint { margin-left: auto; font-size: 0.75rem; color: var(--muted); white-space: nowrap; }
  kbd { background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; padding: 1px 5px; font-size: 0.7rem; font-family: monospace; }

  /* Layout */
  .layout { display: flex; min-height: calc(100vh - 60px); }
  .sidebar { width: 220px; flex-shrink: 0; background: var(--surface); border-right: 1px solid var(--border); padding: 20px 0; position: sticky; top: 60px; height: calc(100vh - 60px); overflow-y: auto; }
  .sidebar-title { font-size: 0.7rem; font-weight: 600; letter-spacing: 0.08em; color: var(--muted); text-transform: uppercase; padding: 0 16px 8px; }
  .sidebar-item { display: flex; align-items: center; justify-content: space-between; padding: 7px 16px; cursor: pointer; font-size: 0.85rem; border-left: 3px solid transparent; transition: all 0.15s; color: var(--muted); }
  .sidebar-item:hover, .sidebar-item.active { color: var(--text); background: var(--surface2); border-left-color: var(--accent); }
  .sidebar-item .count { font-size: 0.7rem; background: var(--surface2); padding: 2px 7px; border-radius: 10px; }
  .sidebar-divider { height: 1px; background: var(--border); margin: 12px 0; }
  .sidebar-total { padding: 7px 16px; font-size: 0.8rem; color: var(--muted); }

  /* Main content */
  .main { flex: 1; padding: 28px 28px 60px; overflow-y: auto; min-width: 0; }
  .division-header { display: flex; align-items: center; gap: 12px; margin: 32px 0 16px; }
  .division-header:first-child { margin-top: 0; }
  .division-title { font-size: 1.1rem; font-weight: 600; }
  .division-count { font-size: 0.75rem; background: var(--surface2); border: 1px solid var(--border); padding: 2px 10px; border-radius: 12px; color: var(--muted); }
  .division-line { flex: 1; height: 1px; background: var(--border); }

  /* Agent grid */
  .agent-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 12px; }
  .agent-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px; cursor: pointer; transition: all 0.15s; position: relative; overflow: hidden; }
  .agent-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--card-color, var(--accent)); }
  .agent-card:hover { border-color: var(--card-color, var(--accent)); transform: translateY(-1px); box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
  .card-name { font-weight: 600; font-size: 0.95rem; margin-bottom: 6px; }
  .card-desc { font-size: 0.78rem; color: var(--muted); line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .card-badge { display: inline-block; font-size: 0.65rem; font-weight: 600; letter-spacing: 0.05em; padding: 2px 8px; border-radius: 4px; margin-bottom: 8px; text-transform: uppercase; background: color-mix(in srgb, var(--card-color, var(--accent)) 20%, transparent); color: var(--card-color, var(--accent)); border: 1px solid color-mix(in srgb, var(--card-color, var(--accent)) 40%, transparent); }

  /* Empty state */
  .empty { text-align: center; padding: 80px 20px; color: var(--muted); }
  .empty .icon { font-size: 3rem; margin-bottom: 16px; }
  .empty p { font-size: 1.1rem; margin-bottom: 8px; }
  .empty small { font-size: 0.85rem; }

  /* Detail panel */
  .panel-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
  .panel-overlay.open { opacity: 1; pointer-events: all; }
  .panel { position: fixed; top: 0; right: 0; bottom: 0; width: 600px; max-width: 95vw; background: var(--surface); border-left: 1px solid var(--border); z-index: 201; transform: translateX(100%); transition: transform 0.25s cubic-bezier(0.4,0,0.2,1); display: flex; flex-direction: column; overflow: hidden; }
  .panel.open { transform: translateX(0); }
  .panel-header { padding: 20px 24px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .panel-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 12px; }
  .panel-name { font-size: 1.3rem; font-weight: 700; }
  .panel-division { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-top: 2px; }
  .panel-actions { display: flex; gap: 8px; flex-shrink: 0; }
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 7px 14px; border-radius: 7px; font-size: 0.82rem; font-weight: 500; cursor: pointer; border: 1px solid var(--border); background: var(--surface2); color: var(--text); transition: all 0.15s; white-space: nowrap; }
  .btn:hover { background: var(--border); }
  .btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn.primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
  .btn.close { background: transparent; border-color: transparent; padding: 4px 8px; font-size: 1.1rem; }
  .btn.success { background: #22c55e; border-color: #22c55e; color: #fff; }
  .panel-body { flex: 1; overflow-y: auto; padding: 24px; }
  .panel-loading { text-align: center; padding: 60px 20px; color: var(--muted); }
  .spinner { width: 28px; height: 28px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .panel-body .markdown { font-size: 0.88rem; line-height: 1.7; color: var(--text); }
  .panel-body .markdown h1, .markdown h2, .markdown h3 { margin: 20px 0 10px; font-weight: 600; }
  .panel-body .markdown h1 { font-size: 1.3rem; }
  .panel-body .markdown h2 { font-size: 1.1rem; border-bottom: 1px solid var(--border); padding-bottom: 6px; }
  .panel-body .markdown h3 { font-size: 0.95rem; color: var(--accent-hover); }
  .panel-body .markdown p { margin-bottom: 10px; }
  .panel-body .markdown ul, .markdown ol { margin: 8px 0 10px 20px; }
  .panel-body .markdown li { margin-bottom: 4px; }
  .panel-body .markdown code { background: var(--surface2); border: 1px solid var(--border); padding: 1px 6px; border-radius: 4px; font-family: monospace; font-size: 0.82rem; }
  .panel-body .markdown pre { background: var(--bg); border: 1px solid var(--border); padding: 14px; border-radius: 8px; overflow-x: auto; margin: 10px 0; }
  .panel-body .markdown pre code { background: none; border: none; padding: 0; }
  .panel-body .markdown blockquote { border-left: 3px solid var(--accent); padding: 6px 14px; background: var(--surface2); border-radius: 0 6px 6px 0; margin: 10px 0; color: var(--muted); }
  .panel-body .markdown table { border-collapse: collapse; width: 100%; margin: 10px 0; }
  .panel-body .markdown th, .markdown td { border: 1px solid var(--border); padding: 7px 12px; text-align: left; font-size: 0.82rem; }
  .panel-body .markdown th { background: var(--surface2); font-weight: 600; }
  .panel-body .markdown strong { color: #fff; }

  /* Install guide */
  .install-section { border-top: 1px solid var(--border); padding: 20px 28px; }
  .install-title { font-size: 0.8rem; font-weight: 600; letter-spacing: 0.06em; color: var(--muted); text-transform: uppercase; margin-bottom: 14px; }
  .install-tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
  .tab-btn { padding: 5px 12px; border-radius: 6px; border: 1px solid var(--border); background: var(--surface2); color: var(--muted); font-size: 0.78rem; cursor: pointer; transition: all 0.15s; }
  .tab-btn.active, .tab-btn:hover { border-color: var(--accent); color: var(--accent); background: color-mix(in srgb, var(--accent) 10%, transparent); }
  .tab-content { display: none; }
  .tab-content.active { display: block; }
  .install-code { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 12px 16px; font-family: monospace; font-size: 0.8rem; color: #94a3b8; position: relative; white-space: pre-wrap; word-break: break-all; line-height: 1.6; }
  .install-copy { position: absolute; top: 8px; right: 8px; }

  /* Stats bar */
  .stats-bar { display: flex; gap: 24px; padding: 12px 28px; background: var(--surface); border-bottom: 1px solid var(--border); font-size: 0.8rem; color: var(--muted); }
  .stats-bar span { color: var(--text); font-weight: 600; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--muted); }

  /* Mobile */
  @media (max-width: 768px) {
    .sidebar { display: none; }
    .main { padding: 16px; }
    .search-hint { display: none; }
    .agent-grid { grid-template-columns: 1fr 1fr; gap: 8px; }
    .panel { width: 100%; }
    .panel-actions .btn-label { display: none; }
  }
  @media (max-width: 480px) {
    .agent-grid { grid-template-columns: 1fr; }
  }
</style>
</head>

// STATE
// ============================================================
let activeFilter = 'all';
let searchQuery = '';
let currentAgent = null;
let rawContentCache = {};

// ============================================================
// COLOR UTILITIES
// ============================================================
function resolveColor(color) {
  const namedColors = {
    'cyan': '#06b6d4', 'blue': '#3b82f6', 'green': '#22c55e',
    'purple': '#a855f7', 'red': '#ef4444', 'orange': '#f97316',
    'pink': '#ec4899', 'gold': '#eab308', 'gray': '#6b7280',
    'teal': '#14b8a6', 'yellow': '#facc15', 'indigo': '#6366f1',
    'amber': '#f59e0b', 'violet': '#7c3aed', 'lime': '#84cc16',
    'fuchsia': '#d946ef', 'rose': '#f43f5e',
    'metallic-blue': '#60a5fa', 'neon-cyan': '#22d3ee', 'neon-green': '#4ade80',
  };
  if (!color) return '#6366f1';
  if (color.startsWith('#')) return color;
  return namedColors[color.toLowerCase()] || '#6366f1';
}

// ============================================================
// RENDER
// ============================================================
function getDivisionAgents(divId) {
  return AGENTS.filter(a => {
    if (activeFilter !== 'all' && a.category !== activeFilter) return false;
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      return a.name.toLowerCase().includes(q) || a.description.toLowerCase().includes(q) || a.category.toLowerCase().includes(q);
    }
    return true;
  }).filter(a => a.category === divId);
}

function renderAll() {
  const list = document.getElementById('agentList');
  const query = searchQuery.trim().toLowerCase();
  const filtered = AGENTS.filter(a => {
    if (activeFilter !== 'all' && a.category !== activeFilter) return false;
    if (query) return a.name.toLowerCase().includes(query) || a.description.toLowerCase().includes(query) || a.category.toLowerCase().includes(query);
    return true;
  });

  if (filtered.length === 0) {
    list.innerHTML = `<div class="empty"><div class="icon">🔍</div><p>No agents found for "${searchQuery}"</p><small>Try a different search term or clear the filter</small></div>`;
    document.getElementById('statsBar').textContent = '0 agents found';
    return;
  }

  const divisionsToShow = activeFilter !== 'all'
    ? DIVISIONS.filter(d => d.id === activeFilter)
    : DIVISIONS;

  let html = '';
  let totalShown = 0;
  for (const div of divisionsToShow) {
    const agents = filtered.filter(a => a.category === div.id);
    if (agents.length === 0) continue;
    totalShown += agents.length;
    html += `
      <div class="division-header" id="div-${div.id}">
        <span style="font-size:1.2rem">${div.emoji}</span>
        <span class="division-title">${div.label}</span>
        <span class="division-count">${agents.length}</span>
        <div class="division-line"></div>
      </div>
      <div class="agent-grid">
        ${agents.map(a => renderCard(a)).join('')}
      </div>
    `;
  }
  list.innerHTML = html;
  updateStats(totalShown, filtered.length);
}

function renderCard(a) {
  const color = resolveColor(a.color);
  const divLabel = DIVISIONS.find(d => d.id === a.category)?.label || a.category;
  return `
    <div class="agent-card" style="--card-color:${color}" onclick="openAgent('${a.id}')" title="${a.name}">
      <div class="card-badge">${divLabel}</div>
      <div class="card-name">${a.name}</div>
      <div class="card-desc">${a.description}</div>
    </div>
  `;
}

function renderSidebar() {
  const items = document.getElementById('sidebarItems');
  const divCounts = {};
  AGENTS.forEach(a => { divCounts[a.category] = (divCounts[a.category] || 0) + 1; });

  let html = `<div class="sidebar-item ${activeFilter === 'all' ? 'active' : ''}" onclick="setFilter('all')">
    <span>All Agents</span><span class="count">${AGENTS.length}</span>
  </div>`;

  for (const div of DIVISIONS) {
    const count = divCounts[div.id] || 0;
    if (count === 0) continue;
    html += `<div class="sidebar-item ${activeFilter === div.id ? 'active' : ''}" onclick="setFilter('${div.id}')">
      <span>${div.emoji} ${div.label}</span>
      <span class="count">${count}</span>
    </div>`;
  }
  items.innerHTML = html;
  document.getElementById('sidebarTotal').textContent = `${AGENTS.length} total agents`;
}

function updateStats(shown, total) {
  const bar = document.getElementById('statsBar');
  bar.innerHTML = `<span>${shown}</span> agents shown &nbsp;·&nbsp; <span>${DIVISIONS.length}</span> divisions &nbsp;·&nbsp; Browse · Copy · Download`;
}

// ============================================================
// FILTER & SEARCH
// ============================================================
function setFilter(divId) {
  activeFilter = divId;
  renderSidebar();
  renderAll();
  if (divId !== 'all') {
    const el = document.getElementById(`div-${divId}`);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
}

document.getElementById('search').addEventListener('input', (e) => {
  searchQuery = e.target.value;
  renderAll();
});

// ============================================================
// PANEL
// ============================================================
async function openAgent(id) {
  const agent = AGENTS.find(a => a.id === id);
  if (!agent) return;
  currentAgent = agent;

  const color = resolveColor(agent.color);
  const divLabel = DIVISIONS.find(d => d.id === agent.category)?.label || agent.category;

  document.getElementById('panelName').textContent = agent.name;
  document.getElementById('panelName').style.color = color;
  document.getElementById('panelDivision').textContent = `${divLabel} · ${agent.file}`;

  document.getElementById('overlay').classList.add('open');
  document.getElementById('panel').classList.add('open');

  document.getElementById('panelBody').innerHTML = '<div class="panel-loading"><div class="spinner"></div><p>Fetching agent prompt…</p></div>';

  renderInstallTabs(agent);

  // Fetch content
  if (rawContentCache[id]) {
    renderPanelContent(rawContentCache[id]);
    return;
  }

  try {
    const url = `${REPO_RAW_BASE}/${agent.file}`;
    const res = await fetch(url);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const text = await res.text();
    rawContentCache[id] = text;
    renderPanelContent(text);
  } catch (err) {
    document.getElementById('panelBody').innerHTML = `
      <div class="panel-loading">
        <p style="color:#ef4444">⚠ Could not fetch from GitHub</p>
        <p style="font-size:0.8rem;margin-top:8px;color:var(--muted)">This may be a CORS issue when opening locally.<br>Deploy to GitHub Pages or view at:<br>
        <a href="${REPO_URL}/blob/master/${agent.file}" target="_blank" style="color:var(--accent)">${agent.file}</a></p>
        <p style="font-size:0.75rem;margin-top:16px;color:var(--muted)"><strong>Description:</strong><br>${agent.description}</p>
      </div>`;
  }
}

function renderPanelContent(raw) {
  // Strip YAML frontmatter for display
  const cleaned = raw.replace(/^---[\s\S]*?---\n?/, '').trim();
  const html = marked.parse(cleaned);
  document.getElementById('panelBody').innerHTML = `<div class="markdown">${html}</div>`;
}

function closePanel() {
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('panel').classList.remove('open');
  currentAgent = null;
}

// ============================================================
// COPY & DOWNLOAD
// ============================================================
async function copyPrompt() {
  if (!currentAgent) return;
  const btn = document.getElementById('btnCopy');
  let text = rawContentCache[currentAgent.id];
  if (!text) {
    btn.textContent = '⏳';
    try {
      const res = await fetch(`${REPO_RAW_BASE}/${currentAgent.file}`);
      text = await res.text();
      rawContentCache[currentAgent.id] = text;
    } catch {
      btn.innerHTML = '❌ Failed';
      setTimeout(() => { btn.innerHTML = '📋 <span class="btn-label">Copy Prompt</span>'; }, 2000);
      return;
    }
  }
  try {
    await navigator.clipboard.writeText(text);
    btn.classList.add('success');
    btn.innerHTML = '✓ <span class="btn-label">Copied!</span>';
    setTimeout(() => {
      btn.classList.remove('success');
      btn.classList.add('primary');
      btn.innerHTML = '📋 <span class="btn-label">Copy Prompt</span>';
    }, 2000);
  } catch {
    // Fallback: select textarea
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    btn.innerHTML = '✓ <span class="btn-label">Copied!</span>';
    setTimeout(() => { btn.innerHTML = '📋 <span class="btn-label">Copy Prompt</span>'; }, 2000);
  }
}

async function downloadAgent() {
  if (!currentAgent) return;
  let text = rawContentCache[currentAgent.id];
  if (!text) {
    try {
      const res = await fetch(`${REPO_RAW_BASE}/${currentAgent.file}`);
      text = await res.text();
      rawContentCache[currentAgent.id] = text;
    } catch {
      alert('Could not fetch file. Try downloading directly from GitHub:\n' + REPO_URL + '/blob/master/' + currentAgent.file);
      return;
    }
  }
  const filename = currentAgent.file.split('/').pop();
  const blob = new Blob([text], { type: 'text/markdown' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  a.click();
  URL.revokeObjectURL(url);
}

// ============================================================
// INSTALL TABS
// ============================================================
function renderInstallTabs(agent) {
  const tabsEl = document.getElementById('installTabs');
  const contentEl = document.getElementById('installContent');

  tabsEl.innerHTML = INSTALL_TOOLS.map((t, i) =>
    `<button class="tab-btn ${i === 0 ? 'active' : ''}" onclick="switchTab(${i})">${t.icon} ${t.label}</button>`
  ).join('');

  contentEl.innerHTML = INSTALL_TOOLS.map((t, i) => `
    <div class="tab-content ${i === 0 ? 'active' : ''}" id="tab-${i}">
      <div class="install-code">${escapeHtml(t.getInstall(agent))}</div>
    </div>
  `).join('');
}

function switchTab(idx) {
  document.querySelectorAll('.tab-btn').forEach((b, i) => b.classList.toggle('active', i === idx));
  document.querySelectorAll('.tab-content').forEach((c, i) => c.classList.toggle('active', i === idx));
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ============================================================
// KEYBOARD SHORTCUTS
// ============================================================
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    if (document.getElementById('panel').classList.contains('open')) closePanel();
  }
  if (e.key === '/' && document.activeElement.tagName !== 'INPUT') {
    e.preventDefault();
    document.getElementById('search').focus();
  }
});

// ============================================================
// INIT
// ============================================================
renderSidebar();
renderAll();
</script>
